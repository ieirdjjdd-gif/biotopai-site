<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاهدة الحصة | BioTopia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/ui-effects.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=2"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
  :root{
    --navy-deep:#101c46;
    --navy-base:#1c2f72;
    --navy-soft:#26398c;
    --green:#5fa82b;
    --green-bright:#8fd155;
    --bone:#f3ecd9;
    --bone-dim:#cdd0e8;
    --line: rgba(243,236,217,0.14);
    --amber:#d98e4b;
    --rose:#b45253;
    /* أنواع المحتوى — نفس ألوان صفحة الكورس */
    --t-video:#e8b84b;
    --t-file:#7bb4f0;
    --t-exam:#e8735a;
    --t-hw:#2dd4bf;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--navy-base); color:var(--bone);
    font-family:'Cairo', sans-serif; line-height:1.7;
  }
  h1,h2,h3{font-family:'Tajawal', sans-serif; font-weight:900;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}

  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 20px; border-radius:100px; font-weight:700; font-size:13.5px;
    background:var(--green); color:var(--navy-deep); border:none; transition:.2s;
  }
  .btn:hover{background:var(--green-bright); transform:translateY(-1px);}
  .btn[disabled]{opacity:.5; cursor:not-allowed; transform:none;}
  .btn-outline{background:transparent; border:1.5px solid var(--line); color:var(--bone);}
  .btn-outline:hover{border-color:var(--green-bright); color:var(--green-bright);}
  .btn-ghost{background:rgba(95,168,43,0.14); color:var(--green-bright); border:1px solid rgba(95,168,43,0.4);}
  .btn-sm{padding:8px 14px; font-size:12.5px;}

  header{
    position:sticky; top:0; z-index:60;
    background:rgba(16,28,70,0.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .header-row{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1180px; margin:0 auto; padding:14px 24px; gap:14px;
  }
  .brand{display:flex; align-items:center; gap:10px; min-width:0;}
  .brand svg{width:32px; height:32px; flex-shrink:0;}
  .brand-text{font-family:'Tajawal'; font-weight:800; font-size:17px; color:var(--green-bright); white-space:nowrap;}
  .course-name-crumb{font-size:12.5px; color:var(--bone-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .back-link{font-size:13px; color:var(--bone-dim); white-space:nowrap;}
  .back-link:hover{color:var(--green-bright);}

  .wrap{max-width:1180px; margin:0 auto; padding:26px 24px 70px;}

  /* ===== حالات التحميل / الرفض ===== */
  #state-loading, #state-denied{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:60vh; text-align:center; gap:14px;
  }
  #state-denied p{color:var(--bone-dim); font-size:14px; max-width:420px;}

  /* ===== SHELL ===== */
  .lesson-shell{display:grid; grid-template-columns:1fr 320px; gap:24px; align-items:start;}

  .player-wrap{
    background:#000; border-radius:18px; overflow:hidden; border:1px solid var(--line);
    aspect-ratio:16/9; position:relative; user-select:none; -webkit-user-select:none;
  }
  .player-wrap iframe, .player-wrap video{
    width:100%; height:100%; border:none; display:block; pointer-events:none; /* كل التفاعل عن طريق الشريط المخصّص */
  }
  .player-empty{
    height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--bone-dim); gap:8px; font-size:13.5px;
  }

  /* ===== مشغّل الفيديو المخصّص ===== */
  .cp{position:absolute; inset:0;}
  .cp-surface{position:absolute; inset:0;}
  .cp-catcher{position:absolute; inset:0; z-index:4; cursor:pointer; background:transparent;}
  .cp-center-play{
    position:absolute; inset:0; z-index:5; display:flex; align-items:center; justify-content:center;
    background:rgba(9,14,36,0.94); opacity:0; pointer-events:none; transition:opacity .18s;
  }
  .cp-center-play.show{opacity:1; pointer-events:auto;}
  .cp-center-play svg{width:64px; height:64px; filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));}
  .cp-poster-title{position:absolute; bottom:22%; left:0; right:0; text-align:center; color:var(--bone-dim); font-size:13px; padding:0 20px;}
  .cp-spinner{
    position:absolute; inset:0; z-index:6; display:none; align-items:center; justify-content:center;
    background:rgba(9,14,36,0.94);
  }
  .cp-spinner.show{display:flex;}
  .cp-spinner .ring{
    width:38px; height:38px; border-radius:50%; border:3px solid rgba(243,236,217,0.25);
    border-top-color:var(--green-bright); animation:cpspin .8s linear infinite;
  }
  @keyframes cpspin{to{transform:rotate(360deg);}}

  .cp-flash{
    position:absolute; top:0; bottom:0; width:50%; z-index:7; display:flex; align-items:center;
    justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .cp-flash.show{opacity:1;}
  .cp-flash-left{left:0;}
  .cp-flash-right{right:0;}
  .cp-flash-badge{
    width:62px; height:62px; border-radius:50%; background:rgba(16,28,70,0.7);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    color:var(--bone); font-size:11.5px; font-weight:700;
  }
  .cp-flash-badge span:first-child{font-size:19px;}

  .cp-bar{
    position:absolute; left:0; right:0; bottom:0; z-index:10;
    background:linear-gradient(transparent, rgba(0,0,0,0.88) 55%);
    padding:26px 14px 10px; opacity:0; transform:translateY(4px);
    transition:opacity .2s, transform .2s; pointer-events:none;
  }
  .cp:hover .cp-bar, .cp.active .cp-bar, .cp.paused-ui .cp-bar{opacity:1; transform:none; pointer-events:auto;}

  .cp-seek{position:relative; height:14px; display:flex; align-items:center; cursor:pointer; margin-bottom:6px;}
  .cp-seek-track{position:relative; width:100%; height:4px; border-radius:4px; background:rgba(243,236,217,0.25); overflow:hidden;}
  .cp-seek-buffered{position:absolute; inset:0; width:0%; background:rgba(243,236,217,0.35);}
  .cp-seek-fill{position:absolute; inset:0; width:0%; background:var(--green-bright);}
  .cp-seek-handle{
    position:absolute; top:50%; width:12px; height:12px; border-radius:50%; background:var(--green-bright);
    transform:translate(-50%,-50%); left:0%; box-shadow:0 0 0 3px rgba(95,168,43,0.25);
    opacity:0; transition:opacity .15s;
  }
  .cp-seek:hover .cp-seek-handle{opacity:1;}

  .cp-row{display:flex; align-items:center; gap:4px;}
  .cp-btn{
    background:transparent; border:none; color:var(--bone); width:34px; height:34px; border-radius:8px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:.15s;
  }
  .cp-btn:hover{background:rgba(243,236,217,0.12); color:var(--green-bright);}
  .cp-btn svg{width:19px; height:19px;}
  .cp-time{font-size:12px; color:var(--bone-dim); white-space:nowrap; padding:0 6px; font-variant-numeric:tabular-nums;}
  .cp-spacer{flex:1;}

  .cp-vol{display:flex; align-items:center; gap:4px;}
  .cp-vol input[type=range]{
    width:0; opacity:0; transition:width .18s, opacity .18s; accent-color:var(--green-bright); cursor:pointer;
  }
  .cp-vol:hover input[type=range], .cp-vol.active input[type=range]{width:64px; opacity:1;}

  .cp-menu-wrap{position:relative;}
  .cp-menu{
    position:absolute; bottom:40px; left:50%; transform:translateX(-50%);
    background:rgba(16,20,42,0.97); border:1px solid var(--line); border-radius:10px;
    min-width:110px; padding:6px; display:none; flex-direction:column; gap:2px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4); z-index:20;
  }
  .cp-menu.open{display:flex;}
  .cp-menu button{
    background:transparent; border:none; color:var(--bone-dim); font-size:12.5px; text-align:center;
    padding:7px 8px; border-radius:6px; white-space:nowrap;
  }
  .cp-menu button:hover{background:rgba(95,168,43,0.16); color:var(--green-bright);}
  .cp-menu button.active{color:var(--green-bright); font-weight:700;}

  /* شارة العلامة المائية - رقم الطالب/إيميله يتحرك فوق الفيديو */
  .cp-watermark{
    position:absolute; z-index:8; pointer-events:none; color:rgba(243,236,217,0.5);
    font-size:13px; font-weight:800; white-space:nowrap; font-family:'Cairo', sans-serif;
    text-shadow:0 1px 3px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5);
    transition:top 1.2s ease, left 1.2s ease;
  }

  /* غطاء يظهر لو المستخدم بدّل التاب/الشباك وقت التشغيل */
  .cp-focus-guard{
    position:absolute; inset:0; z-index:30; display:none; flex-direction:column; align-items:center;
    justify-content:center; gap:10px; background:rgba(10,16,40,0.92); text-align:center; padding:20px;
  }
  .cp-focus-guard.show{display:flex;}
  .cp-focus-guard p{font-size:13px; color:var(--bone-dim); max-width:280px;}

  .lesson-head{
    margin-top:20px; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .lesson-head h1{font-size:21px; color:var(--bone); margin-bottom:6px;}
  .lesson-head .num-tag{font-size:12.5px; color:var(--green-bright); font-weight:700; margin-bottom:8px; display:block;}
  .lesson-nav-row{display:flex; gap:10px; margin-top:18px;}

  .panel{background:var(--navy-soft); border:1px solid var(--line); border-radius:18px; padding:22px; margin-top:22px;}
  .panel h2{font-size:15px; margin-bottom:14px; display:flex; align-items:center; gap:8px;}

  /* ملفات مرفقة */
  .file-row{
    display:flex; align-items:center; gap:12px; padding:12px 14px;
    background:var(--navy-deep); border:1px solid var(--line); border-radius:12px; margin-bottom:10px;
    border-inline-start:3px solid var(--t-file); transition:.18s;
  }
  .file-row:hover{background:rgba(255,255,255,0.03);}
  .file-row:last-child{margin-bottom:0;}
  .file-ic{
    width:36px; height:36px; border-radius:10px; background:color-mix(in srgb, var(--t-file) 18%, transparent);
    display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
  }
  .file-row .fname{font-size:13.5px; color:var(--bone); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .file-row a{color:var(--t-file); font-weight:700; font-size:12.5px; flex-shrink:0;}
  .file-row a:hover{text-decoration:underline;}
  .file-empty{font-size:13px; color:var(--bone-dim);}
  .lecture-section-block{margin-bottom:20px;}
  .lecture-section-block:last-child{margin-bottom:0;}
  .lecture-section-title{
    font-size:13px; font-weight:800; color:var(--green-bright); margin-bottom:10px;
    padding-inline-start:2px;
  }
  .file-row.is-playing{border-inline-start-color:var(--green-bright); background:rgba(95,168,43,0.08);}

  /* ===== SIDEBAR: قائمة حصص الكورس ===== */
  .side-panel{
    background:var(--navy-soft); border:1px solid var(--line); border-radius:18px;
    padding:18px; position:sticky; top:88px;
  }
  .side-panel h2{font-size:14px; margin-bottom:14px; padding:0 4px;}
  .side-lesson-list{display:flex; flex-direction:column; gap:4px; max-height:70vh; overflow-y:auto;}
  .side-lesson{
    display:flex; align-items:center; gap:10px; padding:11px 10px; border-radius:12px;
    font-size:13px; color:var(--bone-dim); transition:.15s;
  }
  .side-lesson:hover{background:rgba(243,236,217,0.05);}
  .side-lesson.current{background:rgba(95,168,43,0.16); color:var(--green-bright); font-weight:700;}
  .side-lesson.locked{opacity:.55; cursor:not-allowed;}
  .side-lesson .st-ic{width:20px; text-align:center; flex-shrink:0; font-size:13px;}
  .side-lesson .st-title{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  @media (max-width:900px){
    .lesson-shell{grid-template-columns:1fr;}
    .side-panel{position:static;}
    .course-name-crumb{display:none;}
  }
</style>
<script src="js/ui-effects.js" defer></script>
</head>

</div>
<header>
  <div class="header-row">
    <div class="brand">
      <svg viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#5fa82b"/>
        <path d="M12 40 L18 27 L24 33 L30 27 L36 40 Z" fill="#101c46"/>

      </svg>
      <div class="brand-text">Bio<span style="color:#f3ecd9">Topia</span></div>
      <span class="course-name-crumb" id="crumb-course-name">/ جارٍ التحميل...</span>
    </div>
    <a href="#" id="back-to-course" class="back-link">→ رجوع لصفحة الكورس</a>
  </div>
</header>

<!-- ===== حالة التحميل ===== -->
<div id="state-loading" class="wrap">
  <h2>جارٍ تجهيز الحصة...</h2>
</div>

<!-- ===== حالة عدم الصلاحية ===== -->
<div id="state-denied" class="wrap" style="display:none;">
  <h2 id="denied-title">الحصة دي مقفولة <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></h2>
  <p id="denied-msg">لازم تكون مشترك في الكورس عشان تتفرج على الحصة دي.</p>
  <a href="#" id="denied-back" class="btn">رجوع لصفحة الكورس</a>
</div>

<!-- ===== المحتوى ===== -->
<div class="wrap" id="state-content" style="display:none;">
  <div class="lesson-shell">

    <!-- ===== المحتوى الرئيسي ===== -->
    <div>
      <div class="player-wrap" id="player-wrap" oncontextmenu="return false;">
        <div class="player-empty">جارٍ تحميل الفيديو...</div>
      </div>

      <div class="lesson-head">
        <div>
          <span class="num-tag" id="lesson-num-tag">الحصة</span>
          <h1 id="lesson-title">—</h1>
        </div>
        <button class="btn btn-ghost" id="complete-btn" onclick="toggleComplete()"><span class="ic ic-inline"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M5 12.5 9.5 17 19 7"/></svg></span> حدد كـ "خلصتها"</button>
      </div>

      <div class="lesson-nav-row">
        <a href="#" id="prev-lesson-link" class="btn btn-outline btn-sm">→ الحصة السابقة</a>
        <a href="#" id="next-lesson-link" class="btn btn-outline btn-sm">الحصة الجاية ←</a>
      </div>

      <!-- ===== باقي محتوى المحاضرة (فيديوهات / ملفات / امتحانات) ===== -->
      <div class="panel">
        <h2 id="content-panel-title"><span class="ic ic-inline"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M8 12.5V7a4 4 0 0 1 8 0v9a2.5 2.5 0 0 1-5 0V8.5"/></svg></span> محتوى المحاضرة</h2>
        <div id="files-list">
          <p class="file-empty">جارٍ تحميل المحتوى...</p>
        </div>
      </div>
    </div>

    <!-- ===== سايدبار: كل حصص الكورس ===== -->
    <div class="side-panel">
      <h2>محتوى الكورس</h2>
      <div class="side-lesson-list" id="side-lesson-list">
        <div class="side-lesson"><span class="st-title">جارٍ التحميل...</span></div>
      </div>
    </div>

  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const COURSE_ID = params.get('course');
  const LESSON_ID = params.get('lesson');
  let ITEM_ID = params.get('item'); // عنصر فيديو معيّن جوه المحاضرة (اختياري)

  let allLessons = [];
  let currentLesson = null;
  let currentUser = null;
  let isPaid = false;
  let progressRow = null;
  let currentItem = null; // العنصر (section_items) اللي بيتشغّل دلوقتي
  let lessonSections = [];
  let itemsBySection = {};
  let examsById = {};
  let attemptsByExam = {};


  function showState(name){

  // ============================================================
  // مشغّل الفيديو المخصّص: بيغلّف يوتيوب/ملف مباشر بشريط تحكم خاص
  // بالمنصة (بدون أي شعار يوتيوب ظاهر)، وبيدعم فيميو/أي إمبيد تاني
  // كمشغّل احتياطي بسيط. + طبقات حماية أساسية (مش بديل عن DRM حقيقي).
  // ============================================================
  let ytApiPromise = null;
  function loadYouTubeAPI(){
    if(ytApiPromise) return ytApiPromise;
    ytApiPromise = new Promise((resolve) => {
      if(window.YT && window.YT.Player){ resolve(window.YT); return; }
      window.onYouTubeIframeAPIReady = () => resolve(window.YT);
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    });
    return ytApiPromise;
  }

  function parseVideoSource(url){
    if(!url) return { type:'none' };
    let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]+)/);
    if(m) return { type:'youtube', id:m[1] };
    m = url.match(/vimeo\.com\/(\d+)/);
    if(m) return { type:'vimeo', id:m[1] };
    // روابط Bunny Stream (وأي رابط HLS تاني بيخلص .m3u8) بتتشغل بنفس
    // سكين وكنترولز الفيديو العادي، مش بالإمبيد الجاهز بتاعهم
    if(/\.m3u8(\?.*)?$/i.test(url)) return { type:'hls', src:url };
    if(/\.(mp4|webm|ogg)(\?.*)?$/i.test(url)) return { type:'html5', src:url };
    return { type:'embed', src:url };
  }

  function fmtTime(s){
    if(!isFinite(s) || s < 0) s = 0;
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
    const mm = h > 0 ? String(m).padStart(2,'0') : m;
    const ss = String(sec).padStart(2,'0');
    return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
  }

  async function mountYouTube(surface, videoId, autoplay){
    const YT = await loadYouTubeAPI();
    const target = document.createElement('div');
    target.style.cssText = 'width:100%;height:100%;pointer-events:none;';
    surface.appendChild(target);

    const listeners = { timeupdate:[], ended:[], play:[], pause:[] };
    let readyResolve;
    const readyPromise = new Promise(res => readyResolve = res);

    const ytPlayer = new YT.Player(target, {
      videoId,
      host: 'https://www.youtube-nocookie.com', // نسخة الخصوصية: بدون كوكيز يوتيوب وبدون واجهة/شعار
      playerVars: {
        controls: 0, disablekb: 1, modestbranding: 1, rel: 0, showinfo: 0,
        iv_load_policy: 3, cc_load_policy: 0, autoplay: autoplay ? 1 : 0,
        fs: 0, playsinline: 1, origin: window.location.origin
      },
      events: {
        onReady: () => {
          // إيقاف الترجمة إجباريًا حتى لو حساب المستخدم على يوتيوب مفعّل عنده ترجمة تلقائية
          try{
            if(ytPlayer.unloadModule) ytPlayer.unloadModule('captions');
            if(ytPlayer.setOption) ytPlayer.setOption('captions', 'track', {});
          }catch(err){}
          readyResolve();
        },
        onStateChange: (e) => {
          if(e.data === YT.PlayerState.PLAYING) listeners.play.forEach(cb => cb());
          else if(e.data === YT.PlayerState.PAUSED) listeners.pause.forEach(cb => cb());
          else if(e.data === YT.PlayerState.ENDED) listeners.ended.forEach(cb => cb());
        }
      }
    });
    await readyPromise;

    const pollTimer = setInterval(() => listeners.timeupdate.forEach(cb => cb()), 250);

    return {
      type:'youtube',
      play: () => ytPlayer.playVideo(),
      pause: () => ytPlayer.pauseVideo(),
      togglePlay(){ this.isPaused() ? this.play() : this.pause(); },
      isPaused: () => ytPlayer.getPlayerState() !== 1,
      getCurrentTime: () => ytPlayer.getCurrentTime() || 0,
      getDuration: () => ytPlayer.getDuration() || 0,
      getBuffered: () => ytPlayer.getVideoLoadedFraction ? ytPlayer.getVideoLoadedFraction() : 0,
      seekTo: (t) => ytPlayer.seekTo(t, true),
      setVolume: (v) => ytPlayer.setVolume(v),
      getVolume: () => ytPlayer.getVolume(),
      setMuted: (m) => m ? ytPlayer.mute() : ytPlayer.unMute(),
      isMuted: () => ytPlayer.isMuted(),
      setRate: (r) => ytPlayer.setPlaybackRate(r),
      getRate: () => ytPlayer.getPlaybackRate(),
      getAvailableRates: () => ytPlayer.getAvailablePlaybackRates(),
      getQualities(){
        // ملاحظة: يوتيوب بقى غالبًا بيدير الجودة أوتوماتيك، فالمستويات
        // المتاحة هنا بتعتمد على الفيديو نفسه وممكن ترجع "auto" بس
        const levels = ytPlayer.getAvailableQualityLevels ? ytPlayer.getAvailableQualityLevels() : [];
        return (levels && levels.length > 1) ? levels : null;
      },
      getQuality: () => ytPlayer.getPlaybackQuality(),
      setQuality: (q) => ytPlayer.setPlaybackQuality(q),
      on(evt, cb){ if(listeners[evt]) listeners[evt].push(cb); },
      destroy(){ clearInterval(pollTimer); ytPlayer.destroy(); }
    };
  }

  function mountHtml5(surface, url){
    const video = document.createElement('video');
    video.src = url;
    video.style.cssText = 'width:100%;height:100%;pointer-events:none;';
    video.preload = 'metadata';
    video.setAttribute('playsinline', '');
    video.setAttribute('controlsList', 'nodownload noremoteplayback');
    video.disablePictureInPicture = true;
    surface.appendChild(video);

    const listeners = { timeupdate:[], ended:[], play:[], pause:[] };
    video.addEventListener('timeupdate', () => listeners.timeupdate.forEach(cb => cb()));
    video.addEventListener('ended', () => listeners.ended.forEach(cb => cb()));
    video.addEventListener('play', () => listeners.play.forEach(cb => cb()));
    video.addEventListener('pause', () => listeners.pause.forEach(cb => cb()));

    return {
      type:'html5',
      play: () => video.play(),
      pause: () => video.pause(),
      togglePlay(){ video.paused ? video.play() : video.pause(); },
      isPaused: () => video.paused,
      getCurrentTime: () => video.currentTime || 0,
      getDuration: () => video.duration || 0,
      getBuffered(){
        if(!video.buffered.length || !video.duration) return 0;
        return video.buffered.end(video.buffered.length - 1) / video.duration;
      },
      seekTo: (t) => { video.currentTime = t; },
      setVolume: (v) => { video.volume = Math.min(1, Math.max(0, v/100)); },
      getVolume: () => video.volume * 100,
      setMuted: (m) => { video.muted = m; },
      isMuted: () => video.muted,
      setRate: (r) => { video.playbackRate = r; },
      getRate: () => video.playbackRate,
      getAvailableRates: () => [0.5,0.75,1,1.25,1.5,1.75,2],
      getQualities: () => null,
      on(evt, cb){ if(listeners[evt]) listeners[evt].push(cb); },
      destroy(){ video.pause(); video.src=''; }
    };
  }

  function mountHls(surface, url){
    const video = document.createElement('video');
    video.style.cssText = 'width:100%;height:100%;pointer-events:none;';
    video.preload = 'metadata';
    video.setAttribute('playsinline', '');
    video.setAttribute('controlsList', 'nodownload noremoteplayback');
    video.disablePictureInPicture = true;
    surface.appendChild(video);

    const listeners = { timeupdate:[], ended:[], play:[], pause:[], qualities:[] };
    video.addEventListener('timeupdate', () => listeners.timeupdate.forEach(cb => cb()));
    video.addEventListener('ended', () => listeners.ended.forEach(cb => cb()));
    video.addEventListener('play', () => listeners.play.forEach(cb => cb()));
    video.addEventListener('pause', () => listeners.pause.forEach(cb => cb()));

    let hls = null;
    let levels = []; // [{index, height}]
    let currentLevel = -1; // -1 = تلقائي (Auto)

    if(window.Hls && Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        levels = hls.levels.map((l, i) => ({ index:i, height:l.height })).sort((a,b) => b.height - a.height);
        // بيانات الجودات بتوصل بعد الميتاداتا بشوية (Async)، فبنبلغ واجهة
        // التحكم لحظة ما تبقى جاهزة عشان تبني زرار الجودة
        listeners.qualities.forEach(cb => cb());
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      // سفاري وآيفون بيدعموا HLS مباشرة من غير الحاجة لمكتبة خارجية
      video.src = url;
    } else {
      surface.innerHTML = '<div class="player-empty">المتصفح ده مش بيدعم تشغيل الفيديو</div>';
    }

    return {
      type:'hls',
      play: () => video.play(),
      pause: () => video.pause(),
      togglePlay(){ video.paused ? video.play() : video.pause(); },
      isPaused: () => video.paused,
      getCurrentTime: () => video.currentTime || 0,
      getDuration: () => video.duration || 0,
      getBuffered(){
        if(!video.buffered.length || !video.duration) return 0;
        return video.buffered.end(video.buffered.length - 1) / video.duration;
      },
      seekTo: (t) => { video.currentTime = t; },
      setVolume: (v) => { video.volume = Math.min(1, Math.max(0, v/100)); },
      getVolume: () => video.volume * 100,
      setMuted: (m) => { video.muted = m; },
      isMuted: () => video.muted,
      setRate: (r) => { video.playbackRate = r; },
      getRate: () => video.playbackRate,
      getAvailableRates: () => [0.5,0.75,1,1.25,1.5,1.75,2],
      getQualities(){
        if(!hls || levels.length < 2) return null;
        return ['auto', ...levels.map(l => l.height + 'p')];
      },
      getQuality(){
        if(!hls || currentLevel === -1) return 'auto';
        const lvl = levels.find(l => l.index === currentLevel);
        return lvl ? lvl.height + 'p' : 'auto';
      },
      setQuality(q){
        if(!hls) return;
        if(q === 'auto'){ hls.currentLevel = -1; currentLevel = -1; return; }
        const h = parseInt(q, 10);
        const lvl = levels.find(l => l.height === h);
        if(lvl){ hls.currentLevel = lvl.index; currentLevel = lvl.index; }
      },
      on(evt, cb){ if(listeners[evt]) listeners[evt].push(cb); },
      destroy(){ if(hls) hls.destroy(); video.pause(); video.src=''; }
    };
  }

  function wireControls(cp, adapter){
    const q = role => cp.querySelector(`[data-role="${role}"]`);
    const catcher = q('catcher'), centerPlay = q('centerplay');
    const playBtn = q('playbtn'), muteBtn = q('mutebtn'), volSlider = q('volslider');
    const timeEl = q('time'), seek = q('seek'), fillEl = q('fill'), bufferedEl = q('buffered'), handleEl = q('handle');
    const speedBtn = q('speedbtn'), speedMenu = q('speedmenu');
    const qualityWrap = q('qualitywrap'), qualityBtn = q('qualitybtn'), qualityMenu = q('qualitymenu');
    const fsBtn = q('fsbtn');
    const container = cp.parentElement;

    let seeking = false;

    function setPlayIcon(){
      const paused = adapter.isPaused();
      playBtn.innerHTML = paused
        ? '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5v14l11-7Z" fill="currentColor" stroke="none"/></svg>'
        : '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5v14M17 5v14"/></svg>';
      centerPlay.classList.toggle('show', paused);
      cp.classList.toggle('paused-ui', paused);
    }

    function updateProgress(){
      if(seeking) return;
      const dur = adapter.getDuration();
      const cur = adapter.getCurrentTime();
      if(dur > 0){
        const pct = Math.min(100, (cur/dur)*100);
        fillEl.style.width = pct + '%';
        handleEl.style.left = pct + '%';
      }
      const buf = adapter.getBuffered ? adapter.getBuffered() : 0;
      bufferedEl.style.width = (buf*100) + '%';
      timeEl.textContent = `${fmtTime(cur)} / ${fmtTime(dur)}`;
    }

    adapter.on('timeupdate', updateProgress);
    adapter.on('play', setPlayIcon);
    adapter.on('pause', setPlayIcon);
    adapter.on('ended', setPlayIcon);

    // ===== تشغيل/إيقاف بضغطة، وتقديم/ترجيع 10 ثواني بضغطتين على نص الشاشة (زي يوتيوب) =====
    const flashLeft = q('flashleft'), flashRight = q('flashright');
    function flashSeek(side){
      const el = side === 'right' ? flashRight : flashLeft;
      el.classList.remove('show');
      void el.offsetWidth;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 550);
    }
    let lastTapTime = 0, lastTapSide = null, singleClickTimer = null;
    catcher.addEventListener('click', (e) => {
      const rect = catcher.getBoundingClientRect();
      const side = (e.clientX - rect.left) < rect.width / 2 ? 'left' : 'right';
      const now = Date.now();
      if(side === lastTapSide && (now - lastTapTime) < 350){
        clearTimeout(singleClickTimer);
        lastTapTime = 0; lastTapSide = null;
        const dur = adapter.getDuration();
        const delta = side === 'right' ? 10 : -10;
        adapter.seekTo(Math.max(0, Math.min(dur || Infinity, adapter.getCurrentTime() + delta)));
        flashSeek(side);
      } else {
        lastTapTime = now; lastTapSide = side;
        clearTimeout(singleClickTimer);
        singleClickTimer = setTimeout(() => { adapter.togglePlay(); lastTapSide = null; }, 300);
      }
    });
    centerPlay.addEventListener('click', () => adapter.togglePlay());
    playBtn.addEventListener('click', () => adapter.togglePlay());

    function seekFromEvent(e){
      const rect = seek.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      return Math.min(1, Math.max(0, x / rect.width));
    }
    seek.addEventListener('mousedown', (e) => {
      seeking = true;
      const move = (ev) => {
        const p = seekFromEvent(ev);
        fillEl.style.width = (p*100) + '%';
        handleEl.style.left = (p*100) + '%';
      };
      const up = (ev) => {
        const p = seekFromEvent(ev);
        adapter.seekTo(p * adapter.getDuration());
        seeking = false;
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
      };
      move(e);
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    });

    volSlider.value = adapter.getVolume ? adapter.getVolume() : 100;
    function refreshMuteIcon(){
      const vol = adapter.getVolume ? adapter.getVolume() : 100;
      const muted = adapter.isMuted && adapter.isMuted();
      muteBtn.innerHTML = (muted || vol === 0)
        ? '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9v6h4l5 4V5L9 9Z"/><path d="m16 9 5 6M21 9l-5 6"/></svg>'
        : (vol < 50
          ? '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9v6h4l5 4V5L9 9Z"/><path d="M16 9.5a3 3 0 0 1 0 5"/></svg>'
          : '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9v6h4l5 4V5L9 9Z"/><path d="M16 8a5 5 0 0 1 0 8M18.5 6a8 8 0 0 1 0 12"/></svg>');
    }
    refreshMuteIcon();
    muteBtn.addEventListener('click', () => {
      const muted = adapter.isMuted && adapter.isMuted();
      adapter.setMuted(!muted);
      refreshMuteIcon();
    });
    volSlider.addEventListener('input', () => {
      adapter.setVolume(Number(volSlider.value));
      if(Number(volSlider.value) > 0 && adapter.isMuted && adapter.isMuted()) adapter.setMuted(false);
      refreshMuteIcon();
    });

    const rates = (adapter.getAvailableRates && adapter.getAvailableRates()) || [0.5,0.75,1,1.25,1.5,1.75,2];
    speedMenu.innerHTML = rates.map(r => `<button type="button" data-rate="${r}">${r}x</button>`).join('');
    function refreshSpeedLabel(){
      const r = adapter.getRate ? adapter.getRate() : 1;
      speedBtn.textContent = `${r}x`;
      speedMenu.querySelectorAll('button').forEach(b => b.classList.toggle('active', Number(b.dataset.rate) === r));
    }
    refreshSpeedLabel();
    function closeAllMenus(){ cp.querySelectorAll('.cp-menu').forEach(m => m.classList.remove('open')); }
    speedBtn.addEventListener('click', (e) => { e.stopPropagation(); const open = speedMenu.classList.contains('open'); closeAllMenus(); if(!open) speedMenu.classList.add('open'); });
    speedMenu.addEventListener('click', (e) => {
      const btn = e.target.closest('button'); if(!btn) return;
      adapter.setRate(Number(btn.dataset.rate));
      refreshSpeedLabel();
      speedMenu.classList.remove('open');
    });

    const qualityLabels = { hd2160:'4K', hd1440:'1440p', hd1080:'1080p', hd720:'720p', large:'480p', medium:'360p', small:'240p', tiny:'144p', auto:'تلقائي' };
    if(adapter.type === 'youtube' || adapter.type === 'hls'){
      function refreshQualityLabel(){
        const cur = adapter.getQuality ? adapter.getQuality() : 'auto';
        qualityBtn.textContent = qualityLabels[cur] || 'تلقائي';
        qualityMenu.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.q === cur));
      }
      function renderQualityMenu(){
        const reported = adapter.getQualities ? adapter.getQualities() : null;
        if(adapter.type === 'youtube'){
          const list = (reported && reported.length) ? reported : ['hd1080','hd720','large','medium','small','auto'];
          qualityWrap.style.display = '';
          qualityMenu.innerHTML = list.map(qq => `<button type="button" data-q="${qq}">${qualityLabels[qq] || qq}</button>`).join('');
        } else {
          // Bunny/HLS: لو الفيديو متاح بجودة واحدة بس، نسيب الزرار مخفي
          if(!reported || reported.length < 2){ qualityWrap.style.display = 'none'; return; }
          qualityWrap.style.display = '';
          qualityMenu.innerHTML = reported.map(qq => `<button type="button" data-q="${qq}">${qualityLabels[qq] || qq}</button>`).join('');
        }
        refreshQualityLabel();
      }
      renderQualityMenu();
      // في حالة Bunny، بيانات الجودات المتاحة بتوصل بعد شوية من تحميل
      // الفيديو (مش فورية زي يوتيوب)، فبنستنى الإشعار ده ونعيد بناء القائمة
      if(adapter.type === 'hls'){ adapter.on('qualities', renderQualityMenu); }
      qualityBtn.addEventListener('click', (e) => { e.stopPropagation(); const open = qualityMenu.classList.contains('open'); closeAllMenus(); if(!open) qualityMenu.classList.add('open'); });
      qualityMenu.addEventListener('click', (e) => {
        const btn = e.target.closest('button'); if(!btn) return;
        adapter.setQuality(btn.dataset.q);
        setTimeout(refreshQualityLabel, 400);
        qualityMenu.classList.remove('open');
      });
    }
    document.addEventListener('click', closeAllMenus);

    fsBtn.addEventListener('click', () => {
      if(document.fullscreenElement){ document.exitFullscreen(); }
      else if(container.requestFullscreen){ container.requestFullscreen(); }
    });

    setPlayIcon();
    updateProgress();
  }

  function mountWatermark(container){
    const wm = document.createElement('div');
    wm.className = 'cp-watermark';
    wm.textContent = currentUser ? (currentUser.email || currentUser.id || '') : '';
    container.appendChild(wm);
    function reposition(){
      wm.style.top = (8 + Math.random()*58) + '%';
      wm.style.left = (8 + Math.random()*66) + '%';
    }
    reposition();
    setInterval(reposition, 20000);
  }

  function wireFocusGuard(cp, adapter){
    const guard = cp.querySelector('[data-role="focusguard"]');
    document.addEventListener('visibilitychange', () => {
      if(document.hidden && adapter && !adapter.isPaused()){
        adapter.pause();
        guard.classList.add('show');
      }
    });
    guard.addEventListener('click', () => guard.classList.remove('show'));
  }

  async function mountPlayer(container, videoUrl){
    container.innerHTML = '';
    const src = parseVideoSource(videoUrl);

    if(src.type === 'none'){
      container.innerHTML = `<div class="player-empty">لسه مفيش فيديو مضاف للحصة دي</div>`;
      return;
    }

    // فيميو/أي إمبيد خارجي تاني: مفيش API موحّد نقدر نبني بيه شريط تحكم
    // مخصص بشكل موثوق، فبنسيب المشغل الأصلي بتاعه شغال عادي
    if(src.type === 'vimeo' || src.type === 'embed'){
      const iframe = document.createElement('iframe');
      iframe.src = src.type === 'vimeo' ? `https://player.vimeo.com/video/${src.id}` : src.src;
      iframe.allow = 'accelerometer; autoplay; encrypted-media; picture-in-picture; fullscreen';
      iframe.allowFullscreen = true;
      iframe.style.pointerEvents = 'auto';
      container.appendChild(iframe);
      mountWatermark(container);
      return;
    }

    const cp = document.createElement('div');
    cp.className = 'cp';
    cp.innerHTML = buildSkinMarkup();
    container.appendChild(cp);
    const surface = cp.querySelector('[data-role="surface"]');
    mountWatermark(container); // العلامة المائية تظهر من أول لحظة، حتى قبل تشغيل الفيديو

    if(src.type === 'youtube'){
      // بنأجّل تحميل يوتيوب لحد ما الطالب يضغط تشغيل فعليًا، عشان صورة
      // العنوان/القناة اللي يوتيوب بيحطها تلقائيًا قبل التشغيل ما تظهرش خالص
      const centerPlay = cp.querySelector('[data-role="centerplay"]');
      const catcher = cp.querySelector('[data-role="catcher"]');
      const startLoading = async () => {
        catcher.removeEventListener('click', startLoading);
        centerPlay.removeEventListener('click', startLoading);
        centerPlay.classList.remove('show');
        const spinner = document.createElement('div');
        spinner.className = 'cp-spinner show';
        spinner.innerHTML = '<div class="ring"></div>';
        cp.appendChild(spinner);
        const adapter = await mountYouTube(surface, src.id, true);
        spinner.remove();
        wireControls(cp, adapter);
        wireFocusGuard(cp, adapter);
      };
      catcher.addEventListener('click', startLoading);
      centerPlay.addEventListener('click', startLoading);
      return;
    }

    if(src.type === 'hls'){
      const adapter = mountHls(surface, src.src);
      wireControls(cp, adapter);
      wireFocusGuard(cp, adapter);
      return;
    }

    const adapter = mountHtml5(surface, src.src);
    wireControls(cp, adapter);
    wireFocusGuard(cp, adapter);
  }

  async function init(){
    if(!COURSE_ID || !LESSON_ID){
      denied('رابط غير صحيح <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M12 4 2 20h20Z"/><path d="M12 10v4"/><circle cx="12" cy="17" r=".4" fill="currentColor" stroke="none"/></svg>', 'الرابط ده ناقصه بيانات، ارجع لصفحة الكورس واختار الحصة تاني.');
      return;
    }

    const user = await requireAuth();
    if(!user) return; // requireAuth بيحوّل لصفحة الدخول لو مفيش مستخدم
    currentUser = user;

    document.getElementById('back-to-course').href = `dr-rady-course-page.html?id=${COURSE_ID}`;
    document.getElementById('denied-back').href = `dr-rady-course-page.html?id=${COURSE_ID}`;

    // بيانات الكورس (للاسم في الهيدر)
    const { data: course } = await supabaseClient
      .from('courses').select('title').eq('id', COURSE_ID).single();
    if(course){
      document.getElementById('crumb-course-name').textContent = '/ ' + course.title;
      document.title = course.title + ' | BioTopia';
    }

    // ملحوظة أمان: مبنجيبش video_url هنا لكل حصص الكورس. لو جبناه هنا،
    // أي مستخدم مسجل دخول (حتى لو مش مشترك في الكورس) هيقدر يشوف
    // روابط فيديوهات كل الحصص المدفوعة من الـ Network tab، حتى لو الواجهة
    // مش عارضاها. بنجيب بس البيانات اللي مالهاش حساسية هنا، وهنجيب
    // video_url لحصة واحدة بس بعد ما نتأكد إن المستخدم فعلاً مشترك.
    const { data: lessons, error: lessonsErr } = await supabaseClient
      .from('lessons_public').select('id, course_id, title, order_index, is_free_preview').eq('course_id', COURSE_ID).order('order_index', { ascending: true });

    if(lessonsErr || !lessons || lessons.length === 0){
      denied('حصل خطأ <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M12 4 2 20h20Z"/><path d="M12 10v4"/><circle cx="12" cy="17" r=".4" fill="currentColor" stroke="none"/></svg>', 'مقدرناش نجيب حصص الكورس ده دلوقتي.');
      return;
    }
    allLessons = lessons;

    currentLesson = lessons.find(l => l.id === LESSON_ID);
    if(!currentLesson){
      denied('الحصة مش موجودة <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M12 4 2 20h20Z"/><path d="M12 10v4"/><circle cx="12" cy="17" r=".4" fill="currentColor" stroke="none"/></svg>', 'الحصة دي مش موجودة في الكورس ده.');
      return;
    }

    // هل المستخدم مشترك فعليًا؟
    const { data: enrollment } = await supabaseClient
      .from('enrollments').select('status').eq('user_id', user.id).eq('course_id', COURSE_ID).maybeSingle();
    isPaid = enrollment?.status === 'paid';

    const unlocked = currentLesson.is_free_preview || isPaid;
    if(!unlocked){
      denied('الحصة دي مقفولة <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>', 'لازم تكون مشترك في الكورس عشان تتفرج على الحصة دي.');
      return;
    }

    // ===== هيكل الأقسام والعناصر بتاعة المحاضرة دي (عام، بدون روابط حساسة) =====
    const { data: sections } = await supabaseClient
      .from('lesson_sections')
      .select('id, lesson_id, title, order_index')
      .eq('lesson_id', currentLesson.id)
      .order('order_index', { ascending: true });

    lessonSections = sections || [];
    const sectionIds = lessonSections.map(s => s.id);

    let structureItems = [];
    if(sectionIds.length > 0){
      const { data: items } = await supabaseClient
        .from('section_items_public')
        .select('id, section_id, type, title, order_index, exam_id, file_name')
        .in('section_id', sectionIds)
        .order('order_index', { ascending: true });
      structureItems = items || [];
    }
    itemsBySection = {};
    structureItems.forEach(it => {
      if(!itemsBySection[it.section_id]) itemsBySection[it.section_id] = [];
      itemsBySection[it.section_id].push(it);
    });

    // لو مفيش item محدد في الرابط، هناخد أول عنصر فيديو موجود في المحاضرة تلقائيًا
    if(!ITEM_ID){
      const firstVideo = structureItems.find(it => it.type === 'video');
      if(firstVideo) ITEM_ID = firstVideo.id;
    }

    // ===== بيانات الامتحانات المرتبطة بعناصر من نوع exam =====
    const examIds = [...new Set(structureItems.filter(it => it.type === 'exam' && it.exam_id).map(it => it.exam_id))];
    if(examIds.length > 0){
      const { data: examsData } = await supabaseClient
        .from('exams').select('id, title, kind, passing_score').in('id', examIds).eq('is_published', true);
      (examsData || []).forEach(e => { examsById[e.id] = e; });
      const { data: attempts } = await supabaseClient
        .from('exam_attempts').select('exam_id, percentage, completed_at')
        .eq('user_id', user.id).in('exam_id', examIds).order('completed_at', { ascending: false });
      (attempts || []).forEach(a => { if(!(a.exam_id in attemptsByExam)) attemptsByExam[a.exam_id] = a; });
    }

    // ===== دلوقتي بس، وبعد التأكد إن المستخدم يستحق، نجيب رابط الفيديو =====
    // ===== الفعلي للعنصر المطلوب (لو موجود) — مش قبل كده خالص =====
    if(ITEM_ID){
      const { data: fullItem } = await supabaseClient
        .from('section_items')
        .select('id, section_id, type, title, video_url, bunny_video_guid')
        .eq('id', ITEM_ID)
        .eq('type', 'video')
        .single();
      currentItem = fullItem || null;
    }
    // ملحوظة: زي ما كان معمول بالظبط في النسخة القديمة، المشغّل بياخد
    // video_url مباشرة. bunny_video_guid متسيب هنا للتوافق مع لوحة
    // التحكم فقط، ولسه مربوطش بمشغّل فعلي (زي ما كانت الحال قبل كده).
    currentLesson.video_url = currentItem?.video_url || null;

    renderLesson();
    renderSidebar();
    renderLectureContent();
    await loadProgress();
    showState('content');
  }

  function renderLesson(){

    if(prevLesson){
      prevLink.href = `dr-rady-lesson-page.html?course=${COURSE_ID}&lesson=${prevLesson.id}`;
      prevLink.style.display = '';

      prevLink.style.display = 'none';
    }
    if(nextLesson){
      nextLink.href = `dr-rady-lesson-page.html?course=${COURSE_ID}&lesson=${nextLesson.id}`;

      nextLink.style.display = 'none';

  async function toggleComplete(){
    const btn = document.getElementById('complete-btn');
    btn.disabled = true;

    const newValue = !(progressRow?.completed);
    const { data, error } = await supabaseClient
      .from('lesson_progress')
      .upsert({
        user_id: currentUser.id,
        lesson_id: currentLesson.id,
        completed: newValue,
        completed_at: newValue ? new Date().toISOString() : null,
        updated_at: new Date().toISOString()
      }, { onConflict: 'user_id,lesson_id' })
      .select()
      .single();

    btn.disabled = false;
    if(error){
      alert('حصل خطأ، حاول تاني');
      return;
    }
    progressRow = data;
    updateCompleteBtn();
  }

    if(['doc','docx'].includes(ext)) return '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M6 3h9l4 4v14H6Z"/><path d="M15 3v4h4"/></svg>';
    if(['xls','xlsx'].includes(ext)) return '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M6 3h9l4 4v14H6Z"/><path d="M15 3v4h4"/></svg>';
    if(['png','jpg','jpeg','webp'].includes(ext)) return '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><rect x="3.5" y="4.5" width="17" height="15" rx="2"/><circle cx="9" cy="10" r="1.5"/><path d="m5 18 4.5-5 3.5 4 2.5-3 4.5 4"/></svg>';
    return '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M6 3h9l4 4v14H6Z"/><path d="M9 12h6M9 16h6"/></svg>';

  function forceDownload(url, filename){
    fetch(url)
      .then(res => res.blob())
      .then(blob => {
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename || 'file';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(blobUrl), 2000);
      })
      .catch(() => {
        // لو الفتش فشل لأي سبب، افتح الملف في تاب جديد كحل بديل
        window.open(url, '_blank', 'noopener');
      });
  }

  // ===== إن المستخدم عدى بوابة requireAuth + التحقق من الاشتراك فوق) =====

    const { data, error } = await supabaseClient
      .from('section_items')
      .select('file_url, file_name')
      .eq('id', itemId)
      .single();
    if(error || !data?.file_url){
      alert('حصل خطأ في فتح الملف، جرّب تاني');
      return;
    }
    window.open(data.file_url, '_blank', 'noopener');
  }

  async function downloadItemFile(itemId, fileName){
    const { data, error } = await supabaseClient
      .from('section_items')
      .select('file_url')
      .eq('id', itemId)
      .single();
    if(error || !data?.file_url){

  // ===== عرض محتوى المحاضرة كله (أقسام حرة، وجوه كل قسم فيديوهات/ملفات/امتحانات) =====
  function renderLectureContent(){
    const listEl = document.getElementById('files-list');

    if(lessonSections.length === 0){
      listEl.innerHTML = `<p class="file-empty">لسه مفيش محتوى مضاف للمحاضرة دي</p>`;
      return;

    listEl.innerHTML = lessonSections.map(sec => {
      const items = itemsBySection[sec.id] || [];
      const rowsHTML = items.length > 0
        ? items.map(it => renderContentRow(it)).join('')
        : `<p class="file-empty">لسه مفيش محتوى في القسم ده</p>`;
      return `
        <div class="lecture-section-block">
          <h3 class="lecture-section-title">${sec.title}</h3>
          ${rowsHTML}
        </div>`;
    }).join('');
  }

  function renderContentRow(it){
    if(it.type === 'video'){
      const isCurrent = currentItem && it.id === currentItem.id;
      return `
        <div class="file-row ${isCurrent ? 'is-playing' : ''}">
          <div class="file-ic"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><circle cx="12" cy="12" r="9"/><path d="M10 8.5v7l6-3.5Z"/></svg></div>
          <span class="fname">${it.title}${isCurrent ? ' <span style="color:var(--green-bright); font-size:11px;">(بيتشغّل دلوقتي)</span>' : ''}</span>
          ${isCurrent
            ? `<span class="btn btn-sm" style="opacity:.6; cursor:default;"><span class="ic ic-inline"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M8 5v14l11-7Z" fill="currentColor" stroke="none"/></svg></span> حالي</span>`
            : `<a href="dr-rady-lesson-page.html?course=${COURSE_ID}&lesson=${currentLesson.id}&item=${it.id}" class="btn btn-outline btn-sm">مشاهدة</a>`}
        </div>`;
    }
    if(it.type === 'file'){
      const safeName = (it.file_name || it.title || 'file').replace(/'/g, "");
      return `
        <div class="file-row">
          <div class="file-ic">${fileIcon(it.file_name || '')}</div>
          <span class="fname">${it.title}</span>
          <div style="display:flex; gap:8px;">
            <button type="button" class="btn btn-outline btn-sm" onclick="openItemFile('${it.id}')">عرض</button>
            <button type="button" class="btn btn-sm" onclick="downloadItemFile('${it.id}', '${safeName}')">تحميل</button>
          </div>
        </div>`;
    }
    // type === 'exam'
    const exam = examsById[it.exam_id];
    if(!exam){
      return `
        <div class="file-row">
          <div class="file-ic">⏳</div>
          <span class="fname">${it.title}</span>
          <span class="btn btn-sm" style="opacity:.55;">لسه مش متاح</span>
        </div>`;
    }
    const isHw = exam.kind === 'homework';
    const attempt = attemptsByExam[exam.id];
    let actionLabel = isHw ? 'ابدأ الواجب' : 'ابدأ الاختبار';
    let statusText = '';
    if(attempt){
      const passed = attempt.percentage >= (exam.passing_score || 50);
      statusText = ` <span style="color:${passed ? 'var(--green-bright)' : '#e8735a'}; font-size:11px;">(${passed ? '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M5 12.5 9.5 17 19 7"/></svg> ناجح' : '<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="m6 6 12 12M18 6 6 18"/></svg> راسب'} — ${Math.round(attempt.percentage)}%)</span>`;
      actionLabel = 'إعادة المحاولة';
    }
    return `
      <div class="file-row">
