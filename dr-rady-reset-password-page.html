<style>
  :root{
    --navy-deep:#101c46;
    --navy-base:#1c2f72;
    --navy-soft:#26398c;
    --green:#5fa82b;
    --green-bright:#8fd155;
    --bone:#f3ecd9;
    --bone-dim:#e2d8bd;
    --ink:#0c1230;
    --line: rgba(243,236,217,0.16);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--navy-base); color:var(--bone);
    font-family:'Cairo', sans-serif; line-height:1.7;
    min-height:100vh; display:flex; flex-direction:column;
  }
  h1,h2{font-family:'Tajawal', sans-serif; font-weight:900;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit;}

  header{padding:18px 28px; border-bottom:1px solid var(--line);}
  .header-row{display:flex; align-items:center; justify-content:space-between; max-width:1180px; margin:0 auto;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-text{font-family:'Tajawal'; font-weight:800; font-size:20px; color:var(--green-bright);}
  .brand-text span{color:var(--bone);}
  .back-home{font-size:13.5px; font-weight:600; color:var(--bone-dim);}
  .back-home:hover{color:var(--green-bright);}

  main{flex:1; display:flex; align-items:center; justify-content:center; padding:32px 20px;}
  .card{
    background:var(--navy-soft); border:1px solid var(--line); border-radius:24px;
    padding:38px 36px; width:100%; max-width:420px;
  }
  .card h1{font-size:22px; margin-bottom:8px;}
  .card .sub{font-size:14px; color:var(--bone-dim); margin-bottom:24px;}

  .field{margin-bottom:18px;}
  .field label{display:block; font-size:13.5px; font-weight:700; color:var(--bone-dim); margin-bottom:8px;}
  .field input{
    width:100%; background:var(--navy-deep); border:1.5px solid var(--line);
    border-radius:12px; padding:13px 16px; color:var(--bone); font-family:'Cairo';
    font-size:14.5px; outline:none; transition:.2s;
  }
  .field input:focus{border-color:var(--green); background:rgba(95,168,43,0.06);}

  .msg{
    font-size:13px; padding:10px 14px; border-radius:10px; margin-bottom:16px; display:none;
  }
  .msg-error{background:rgba(220,80,80,0.14); border:1px solid rgba(220,80,80,0.4); color:#ffb3b3;}
  .msg-success{background:rgba(95,168,43,0.14); border:1px solid rgba(95,168,43,0.4); color:var(--green-bright);}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:14px 22px; border-radius:100px;
    font-weight:700; font-size:15px;
    background:var(--green); color:var(--navy-deep);
    border:none; cursor:pointer; transition:.2s;
  }
  .btn:hover{background:var(--green-bright); transform:translateY(-1px);}
  .btn[disabled]{opacity:.6; cursor:not-allowed;}

  .switch-note{text-align:center; font-size:13.5px; color:var(--bone-dim); margin-top:20px;}
  .link-accent{font-size:13.5px; font-weight:700; color:var(--green-bright);}
  .link-accent:hover{text-decoration:underline;}
</style>
<script src="js/ui-effects.js" defer></script>
</head>

            </svg>

</div>
<header>
  <div class="header-row">
    <div class="brand">
      <svg width="34" height="34" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#5fa82b"/>

      <div class="brand-text">Bio<span style="color:#f3ecd9">Topai</span></div>
    </div>
    <a href="index.html" class="back-home">→ الرجوع للرئيسية</a>
  </div>
</header>

<main>
  <div class="card">

    <!-- الحالة: جارٍ التأكد من صلاحية الرابط -->
    <div id="state-checking">
      <h1>لحظة واحدة...</h1>
      <p class="sub">بنتأكد من الرابط.</p>
    </div>

    <!-- الحالة: الرابط سليم، اكتب كلمة مرور جديدة -->
    <div id="state-form" style="display:none;">
      <h1>حدّد كلمة مرور جديدة <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></h1>
      <p class="sub">اكتب كلمة مرور جديدة لحسابك.</p>

      <div class="msg msg-error" id="reset-error"></div>

      <div class="field">
        <label for="new-pass">كلمة المرور الجديدة</label>
        <input type="password" id="new-pass" placeholder="8 أحرف على الأقل">
      </div>
      <div class="field">
        <label for="new-pass2">تأكيد كلمة المرور</label>
        <input type="password" id="new-pass2" placeholder="اعد كتابتها">
      </div>

      <button class="btn" id="reset-btn" onclick="handleResetPassword()">حفظ كلمة المرور الجديدة</button>
    </div>

    <!-- الحالة: الرابط منتهي أو غير صالح -->
    <div id="state-invalid" style="display:none;">
      <h1>الرابط ده مش شغال <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><path d="M12 4 2 20h20Z"/><path d="M12 10v4"/><circle cx="12" cy="17" r=".4" fill="currentColor" stroke="none"/></svg></h1>
      <p class="sub">الرابط منتهي الصلاحية أو استُخدم قبل كده. اطلب رابط جديد وحاول تاني.</p>
      <a href="dr-rady-auth-page.html" class="btn" style="text-align:center;">رجوع لصفحة الدخول</a>
    </div>

    <!-- الحالة: تم التغيير بنجاح -->
    <div id="state-done" style="display:none;">
      <h1>تم بنجاح <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><circle cx="12" cy="12" r="9"/><path d="m8.5 12.5 2.5 2.5 5-5"/></svg></h1>
      <p class="sub">كلمة المرور اتغيّرت. هنوديك للوحتك دلوقتي...</p>
    </div>

  </div>
</main>

<script>
  let recoveryReady = false;

  // Supabase بيبعت رابط فيه توكن مؤقت في الـ URL، والمكتبة بتقرأه أوتوماتيك
  // وبتطلق حدث PASSWORD_RECOVERY لو الرابط سليم
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if(event === 'PASSWORD_RECOVERY' && session){
      recoveryReady = true;
      showState('form');
    }
  });

  // شبكة أمان: لو الحدث اتأخر أو الصفحة كانت مفتوحة أصلاً، نتأكد بعد شوية
  setTimeout(async () => {
    if(recoveryReady) return;
    const { data } = await supabaseClient.auth.getSession();
    if(data?.session){
      recoveryReady = true;
      showState('form');
    } else {
      showState('invalid');
    }
  }, 2500);

  function showState(name){
    document.getElementById('state-checking').style.display = name === 'checking' ? 'block' : 'none';
    document.getElementById('state-form').style.display = name === 'form' ? 'block' : 'none';
    document.getElementById('state-invalid').style.display = name === 'invalid' ? 'block' : 'none';
    document.getElementById('state-done').style.display = name === 'done' ? 'block' : 'none';
  }

  function showError(msg){
    const el = document.getElementById('reset-error');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError(){
    document.getElementById('reset-error').style.display = 'none';
  }

  async function handleResetPassword(){
    hideError();
    const pass = document.getElementById('new-pass').value;
    const pass2 = document.getElementById('new-pass2').value;

    if(pass.length < 8){ showError('كلمة المرور لازم تكون 8 أحرف على الأقل'); return; }
    if(pass !== pass2){ showError('كلمتا المرور مش متطابقتين'); return; }

    const btn = document.getElementById('reset-btn');
    btn.disabled = true; btn.textContent = 'جارٍ الحفظ...';

    const { error } = await supabaseClient.auth.updateUser({ password: pass });

    if(error){
      btn.disabled = false; btn.textContent = 'حفظ كلمة المرور الجديدة';
      showError('حصل خطأ، جرّب تطلب رابط جديد من صفحة الدخول');
      return;
    }

    showState('done');
    setTimeout(() => { window.location.href = 'dr-rady-dashboard-page.html'; }, 1800);
  }
</script>

</body>
</html>
