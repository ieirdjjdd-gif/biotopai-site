<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إتمام الاشتراك | BioTopia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#101c46; --navy-base:#1c2f72; --navy-soft:#26398c;
    --green:#5fa82b; --green-bright:#8fd155;
    --bone:#f3ecd9; --bone-dim:#e2d8bd;
    --line: rgba(243,236,217,0.14); --rose:#b45253; --amber:#d98e4b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--navy-base); color:var(--bone); font-family:'Cairo', sans-serif; line-height:1.7;}
  h1,h2,h3{font-family:'Tajawal', sans-serif; font-weight:900;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}

  header{position:sticky; top:0; z-index:60; background:rgba(16,28,70,0.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);}
  .nav{display:flex; align-items:center; justify-content:space-between; padding:16px 28px; max-width:720px; margin:0 auto;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .logo-mark{width:36px; height:36px;}
  .brand-text{font-family:'Tajawal'; font-weight:800; font-size:19px; color:var(--green-bright);}
  .brand-text span{color:var(--bone);}
  .back-link{font-size:13.5px; color:var(--bone-dim); font-weight:600;}
  .back-link:hover{color:var(--green-bright);}

  main{max-width:560px; margin:0 auto; padding:28px 20px 60px;}

  .course-summary{
    background:var(--navy-soft); border:1px solid var(--line); border-radius:18px;
    padding:20px; display:flex; align-items:center; gap:14px; margin-bottom:22px;
  }
  .course-summary img{width:64px; height:64px; border-radius:12px; object-fit:cover; flex-shrink:0; background:var(--navy-deep);}
  .course-summary h2{font-size:15.5px; margin-bottom:4px;}
  .course-summary .price{font-family:'Tajawal'; font-weight:900; color:var(--green-bright); font-size:19px;}

  .step{background:var(--navy-soft); border:1px solid var(--line); border-radius:18px; padding:22px; margin-bottom:18px;}
  .step h3{font-size:15px; display:flex; align-items:center; gap:8px; margin-bottom:14px;}
  .step h3 .num{
    width:24px; height:24px; border-radius:50%; background:var(--green); color:var(--navy-deep);
    display:flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:800; flex-shrink:0;
  }

  .method-row{display:flex; gap:10px; margin-bottom:16px;}
  .method-btn{
    flex:1; padding:14px 10px; border-radius:14px; border:1.5px solid var(--line); background:var(--navy-deep);
    text-align:center; font-size:13.5px; font-weight:700; transition:.2s;
  }
  .method-btn.active{border-color:var(--green-bright); background:rgba(95,168,43,0.14); color:var(--green-bright);}

  .instructions{
    background:var(--navy-deep); border:1.5px dashed var(--line); border-radius:14px; padding:16px;
    font-size:13.5px; color:var(--bone-dim); margin-bottom:4px;
  }
  .instructions b{color:var(--bone); font-weight:800;}
  .instructions .target{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--navy-soft); border-radius:10px; padding:10px 14px; margin-top:10px;
  }
  .instructions .target span{font-family:'Tajawal'; font-weight:800; color:var(--green-bright); font-size:16px; direction:ltr;}
  .copy-btn{background:none; border:1px solid var(--line); border-radius:100px; padding:5px 12px; font-size:11.5px; color:var(--bone-dim);}
  .copy-btn:hover{border-color:var(--green-bright); color:var(--green-bright);}

  .field{margin-bottom:16px;}
  .field label{display:block; font-size:13px; font-weight:700; margin-bottom:7px; color:var(--bone-dim);}
  .field input[type="text"], .field input[type="tel"]{
    width:100%; background:var(--navy-deep); border:1.5px solid var(--line); border-radius:12px;
    padding:12px 14px; color:var(--bone); font-family:'Cairo'; font-size:14px; outline:none; transition:.2s;
  }
  .field input:focus{border-color:var(--green);}

  .upload-box{
    border:1.5px dashed var(--line); border-radius:14px; padding:20px; text-align:center; cursor:pointer;
    transition:.2s; position:relative; overflow:hidden;
  }
  .upload-box:hover{border-color:var(--green-bright);}
  .upload-box input[type="file"]{position:absolute; inset:0; opacity:0; cursor:pointer;}
  .upload-box .ic{font-size:26px; margin-bottom:6px;}
  .upload-box p{font-size:13px; color:var(--bone-dim);}
  .upload-preview{margin-top:14px; display:none;}
  .upload-preview img{max-width:100%; max-height:220px; border-radius:12px; border:1px solid var(--line); display:block; margin:0 auto;}
  .upload-preview .file-name{font-size:12px; color:var(--bone-dim); text-align:center; margin-top:8px;}

  .btn{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    padding:14px 22px; border-radius:100px; font-weight:800; font-size:14.5px;
    background:var(--green); color:var(--navy-deep); border:none; transition:.2s;
  }
  .btn:hover{background:var(--green-bright);}
  .btn:disabled{opacity:.55; cursor:default;}

  .msg{padding:12px 16px; border-radius:12px; font-size:13px; margin-bottom:16px; display:none;}
  .msg-error{background:rgba(180,82,83,0.14); color:#e8a3a4; border:1px solid rgba(180,82,83,0.3);}
  .msg-success{background:rgba(95,168,43,0.14); color:var(--green-bright); border:1px solid rgba(95,168,43,0.3);}

  .status-card{background:var(--navy-soft); border:1px solid var(--line); border-radius:18px; padding:26px; text-align:center;}
  .status-card .ic{font-size:38px; margin-bottom:12px;}
  .status-card h2{font-size:17px; margin-bottom:8px;}
  .status-card p{font-size:13.5px; color:var(--bone-dim); margin-bottom:18px;}

  #loading-state{text-align:center; padding:60px 20px; color:var(--bone-dim);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=2"></script>
</head>
<body>

<header>
  <div class="nav">
    <div class="brand">
      <svg class="logo-mark" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#5fa82b"/>
        <path d="M12 40 L18 27 L24 33 L30 27 L36 40 Z" fill="#101c46"/>
        <path d="M18 27 L24 33 L21 40 Z" fill="#f3ecd9"/>
        <path d="M30 27 L24 33 L27 40 Z" fill="#f3ecd9"/>
        <rect x="22.5" y="33" width="3" height="9" fill="#5fa82b" stroke="#101c46" stroke-width="0.6"/>
        <circle cx="24" cy="18" r="10" fill="#f3ecd9" stroke="#101c46" stroke-width="1.4"/>
        <ellipse cx="20" cy="17" rx="2.3" ry="2.8" fill="#101c46"/>
        <ellipse cx="28" cy="17" rx="2.3" ry="2.8" fill="#101c46"/>
        <path d="M24 20 l-1.4 2.4 h2.8 z" fill="#101c46"/>
        <path d="M18.5 24.5c2 1.6 8 1.6 11 0" stroke="#101c46" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
      <div class="brand-text">Bio<span style="color:#f3ecd9">Topia</span></div>
    </div>
    <a href="dr-rady-catalog-page.html" class="back-link">→ رجوع للكورسات</a>
  </div>
</header>

<main>

  <div id="loading-state">جارٍ التحميل...</div>

  <div id="page-content" style="display:none;">

    <div class="course-summary">
      <img id="course-image" src="" alt="">
      <div>
        <h2 id="course-title">—</h2>
        <div class="price"><span id="course-price">—</span> ج.م</div>
      </div>
    </div>

    <!-- ===== حالة: طلب سابق موجود (pending / paid / rejected) ===== -->
    <div id="status-view" style="display:none;"></div>

    <!-- ===== فورم الدفع ===== -->
    <form id="checkout-form" style="display:none;">

      <div class="msg msg-error" id="form-error"></div>

      <div class="step">
        <h3><span class="num">1</span> اختار طريقة الدفع</h3>
        <div class="method-row">
          <button type="button" class="method-btn active" id="method-vodafone" onclick="selectMethod('vodafone_cash')">📱 فودافون كاش</button>
          <button type="button" class="method-btn" id="method-instapay" onclick="selectMethod('instapay')">🏦 إنستاباي</button>
        </div>

        <div class="instructions" id="instructions-vodafone">
          حوّل قيمة الاشتراك (<b id="instr-price-1">—</b> ج.م) عن طريق <b>فودافون كاش</b> على الرقم:
          <div class="target">
            <span id="vodafone-number">01017852442</span>
            <button type="button" class="copy-btn" onclick="copyText('vodafone-number')">نسخ</button>
          </div>
        </div>

        <div class="instructions" id="instructions-instapay" style="display:none;">
          حوّل قيمة الاشتراك (<b id="instr-price-2">—</b> ج.م) عن طريق <b>إنستاباي</b> على:
          <div class="target">
            <span id="instapay-handle">سيتم إضافته من الأدمن</span>
            <button type="button" class="copy-btn" onclick="copyText('instapay-handle')">نسخ</button>
          </div>
        </div>
      </div>

      <div class="step">
        <h3><span class="num">2</span> بيانات التحويل</h3>

        <div class="field">
          <label for="sender-phone">الرقم اللي حوّلت منه الفلوس</label>
          <input type="tel" id="sender-phone" placeholder="01xxxxxxxxx" required>
        </div>

        <div class="field">
          <label>صورة إشعار التحويل (سكرين شوت أو صورة الإيصال)</label>
          <div class="upload-box" id="upload-box">
            <input type="file" id="receipt-file" accept="image/*" capture="environment">
            <div class="ic">📎</div>
            <p>دوس هنا أو اسحب الصورة لرفعها</p>
          </div>
          <div class="upload-preview" id="upload-preview">
            <img id="preview-img" src="" alt="">
            <div class="file-name" id="preview-name"></div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn" id="submit-btn">إرسال طلب الاشتراك</button>
    </form>

  </div>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const COURSE_ID = params.get('course');

  let currentUser = null;
  let course = null;
  let selectedMethod = 'vodafone_cash';
  let receiptFile = null;

  (async function init(){
    if(!COURSE_ID){
      showError('مفيش كورس محدد. ارجع لصفحة الكورسات واختار الكورس تاني.');
      return;
    }

    const user = await requireAuth();
    if(!user) return;
    currentUser = user;

    const { data: courseData, error: courseErr } = await supabaseClient
      .from('courses').select('id, title, price, image_url').eq('id', COURSE_ID).single();

    if(courseErr || !courseData){
      showError('الكورس ده مش موجود.');
      return;
    }
    course = courseData;

    document.getElementById('course-title').textContent = course.title;
    document.getElementById('course-price').textContent = course.price;
    document.getElementById('instr-price-1').textContent = course.price;
    document.getElementById('instr-price-2').textContent = course.price;
    if(course.image_url) document.getElementById('course-image').src = course.image_url;

    const { data: enrollment } = await supabaseClient
      .from('enrollments').select('*').eq('user_id', user.id).eq('course_id', COURSE_ID).maybeSingle();

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('page-content').style.display = 'block';

    if(enrollment && enrollment.status === 'paid'){
      renderStatus('✅', 'انت مشترك في الكورس ده بالفعل!', 'تقدر تدخل تتفرج على الحصص على طول.',
        `<a href="dr-rady-course-page.html?id=${COURSE_ID}" class="btn" style="text-decoration:none;">روح للكورس</a>`);
      return;
    }

    if(enrollment && enrollment.status === 'pending'){
      renderStatus('⏳', 'طلبك قيد المراجعة', 'استلمنا إشعار التحويل بتاعك وهنراجعه ونفعّل اشتراكك في أقرب وقت — عادة خلال ساعات.');
      return;
    }

    if(enrollment && enrollment.status === 'rejected'){
      document.getElementById('status-view').style.display = 'block';
      document.getElementById('status-view').innerHTML = `
        <div class="status-card">
          <div class="ic">⚠️</div>
          <h2>طلبك السابق اتّرفض</h2>
          <p>تأكد من صورة الإيصال والرقم اللي حوّلت منه، وابعت طلب جديد تحت.</p>
        </div>
      `;
      showCheckoutForm(true);
      return;
    }

    // مفيش طلب سابق خالص
    showCheckoutForm(false);
  })();

  function showError(text){
    document.getElementById('loading-state').innerHTML = `<p style="color:#e8a3a4;">${text}</p>`;
  }

  function renderStatus(icon, title, desc, extraHtml){
    document.getElementById('status-view').style.display = 'block';
    document.getElementById('status-view').innerHTML = `
      <div class="status-card">
        <div class="ic">${icon}</div>
        <h2>${title}</h2>
        <p>${desc}</p>
        ${extraHtml || ''}
      </div>
    `;
  }

  function showCheckoutForm(){
    document.getElementById('checkout-form').style.display = 'block';
  }

  function selectMethod(method){
    selectedMethod = method;
    document.getElementById('method-vodafone').classList.toggle('active', method === 'vodafone_cash');
    document.getElementById('method-instapay').classList.toggle('active', method === 'instapay');
    document.getElementById('instructions-vodafone').style.display = method === 'vodafone_cash' ? 'block' : 'none';
    document.getElementById('instructions-instapay').style.display = method === 'instapay' ? 'block' : 'none';
  }

  function copyText(elId){
    const text = document.getElementById(elId).textContent.trim();
    navigator.clipboard.writeText(text);
  }

  document.getElementById('receipt-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;

    if(!file.type.startsWith('image/')){
      alert('لازم ترفع صورة (jpg, png, ...)');
      e.target.value = '';
      return;
    }
    if(file.size > 5 * 1024 * 1024){
      alert('حجم الصورة كبير قوي، لازم يكون أقل من 5 ميجا');
      e.target.value = '';
      return;
    }

    receiptFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('preview-img').src = ev.target.result;
      document.getElementById('preview-name').textContent = file.name;
      document.getElementById('upload-preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('checkout-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const errorBox = document.getElementById('form-error');
    errorBox.style.display = 'none';

    const senderPhone = document.getElementById('sender-phone').value.trim();

    if(senderPhone.length < 8){
      errorBox.textContent = 'اكتب رقم صحيح اتحول منه الفلوس.';
      errorBox.style.display = 'block';
      return;
    }
    if(!receiptFile){
      errorBox.textContent = 'لازم ترفع صورة إشعار التحويل.';
      errorBox.style.display = 'block';
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'جارٍ الإرسال...';

    try{
      // 1) ارفع صورة الإيصال في مجلد خاص بالطالب ده بس
      const ext = receiptFile.name.split('.').pop() || 'jpg';
      const path = `${currentUser.id}/${COURSE_ID}-${Date.now()}.${ext}`;

      const { error: uploadErr } = await supabaseClient.storage
        .from('payment-receipts')
        .upload(path, receiptFile, { upsert: false });

      if(uploadErr) throw uploadErr;

      // 2) اعمل/حدّث طلب الاشتراك (pending) مع بيانات الدفع
      const { data: existing } = await supabaseClient
        .from('enrollments').select('id, status').eq('user_id', currentUser.id).eq('course_id', COURSE_ID).maybeSingle();

      let dbError;
      if(existing && existing.status === 'rejected'){
        const { error } = await supabaseClient.from('enrollments').update({
          status: 'pending',
          payment_method: selectedMethod,
          sender_phone: senderPhone,
          receipt_path: path,
        }).eq('id', existing.id);
        dbError = error;
      } else {
        const { error } = await supabaseClient.from('enrollments').insert({
          user_id: currentUser.id,
          course_id: COURSE_ID,
          status: 'pending',
          payment_method: selectedMethod,
          sender_phone: senderPhone,
          receipt_path: path,
        });
        dbError = error;
      }

      if(dbError) throw dbError;

      document.getElementById('checkout-form').style.display = 'none';
      renderStatus('✅', 'تم إرسال طلبك بنجاح', 'استلمنا إشعار التحويل وهنراجعه ونفعّل اشتراكك في أقرب وقت.');

    } catch(err){
      console.error('checkout submit error:', err);
      errorBox.textContent = 'حصل خطأ في إرسال الطلب: ' + (err.message || 'حاول تاني');
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'إرسال طلب الاشتراك';
    }
  });
</script>

</body>
</html>
