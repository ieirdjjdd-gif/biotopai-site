<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاختبار | BioTopia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#101c46;
    --navy-base:#1c2f72;
    --navy-soft:#26398c;
    --green:#5fa82b;
    --green-bright:#8fd155;
    --bone:#f3ecd9;
    --bone-dim:#e2d8bd;
    --ink:#0c1230;
    --line: rgba(243,236,217,0.14);
    --rose:#b45253;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--navy-base); color:var(--bone);
    font-family:'Cairo', sans-serif; line-height:1.7;
  }
  h1,h2,h3,h4{font-family:'Tajawal', sans-serif; font-weight:900;}
  a{color:inherit; text-decoration:none;}
  img,svg{display:block; max-width:100%;}
  button{font-family:inherit; cursor:pointer;}

  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:12px 26px; border-radius:100px; font-weight:700; font-size:14px;
    background:var(--green); color:var(--navy-deep); border:none; transition:.2s;
  }
  .btn:hover{background:var(--green-bright); transform:translateY(-1px);}
  .btn:disabled{opacity:.5; cursor:default; transform:none;}
  .btn-outline{background:transparent; border:1.5px solid var(--line); color:var(--bone); padding:11px 24px;}
  .btn-outline:hover{border-color:var(--green-bright); color:var(--green-bright);}
  .link-accent{font-weight:700; color:var(--green-bright);}
  .link-accent:hover{text-decoration:underline;}

  header{
    position:sticky; top:0; z-index:60;
    background:rgba(16,28,70,0.88); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav{display:flex; align-items:center; justify-content:space-between; padding:16px 28px; max-width:900px; margin:0 auto;}
  .nav .brand{display:flex; align-items:center; gap:10px;}
  .nav .brand .logo-mark{width:36px; height:36px;}
  .nav .brand-text{font-family:'Tajawal'; font-weight:800; font-size:19px; color:var(--green-bright);}
  .nav .brand-text span{color:var(--bone);}

  main{max-width:720px; margin:0 auto; padding:32px 24px 70px;}

  /* ===== حالات التحميل / المنع ===== */
  .state-box{text-align:center; padding:60px 26px;}
  .state-box .ic{width:56px; height:56px; border-radius:16px; background:rgba(95,168,43,0.16); display:flex; align-items:center; justify-content:center; font-size:26px; margin:0 auto 18px;}
  .state-box h2{font-size:18px; margin-bottom:8px;}
  .state-box p{font-size:13.5px; color:var(--bone-dim); max-width:420px; margin:0 auto 24px;}

  /* ===== هيدر الاختبار ===== */
  .exam-top{background:var(--navy-soft); border:1px solid var(--line); border-radius:20px; padding:22px 24px; margin-bottom:22px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; position:sticky; top:80px; z-index:10;}
  .exam-top h1{font-size:18px; margin-bottom:4px;}
  .exam-top p{font-size:12.5px; color:var(--bone-dim);}
  .timer{
    display:flex; align-items:center; gap:8px; background:var(--navy-deep); border:1px solid var(--line);
    border-radius:100px; padding:9px 18px; font-weight:800; font-family:'Tajawal'; font-size:15px; color:var(--green-bright);
  }
  .timer.low{color:#e8a3a4; border-color:rgba(180,82,83,0.5);}

  /* ===== الأسئلة ===== */
  .q-card{background:var(--navy-soft); border:1px solid var(--line); border-radius:18px; padding:22px; margin-bottom:16px;}
  .q-card .q-num{font-size:12px; color:var(--green-bright); font-weight:700; margin-bottom:8px;}
  .q-card .q-text{font-size:15.5px; color:var(--bone); margin-bottom:16px; font-weight:600;}
  .opt-list{display:flex; flex-direction:column; gap:10px;}
  .opt{
    display:flex; align-items:center; gap:12px; background:var(--navy-deep); border:1.5px solid var(--line);
    border-radius:13px; padding:13px 16px; cursor:pointer; transition:.15s; font-size:13.5px;
  }
  .opt:hover{border-color:rgba(95,168,43,0.5);}
  .opt.selected{border-color:var(--green); background:rgba(95,168,43,0.1);}
  .opt input{accent-color:var(--green); width:17px; height:17px; flex-shrink:0;}
  .opt.correct{border-color:var(--green); background:rgba(95,168,43,0.16);}
  .opt.wrong{border-color:var(--rose); background:rgba(180,82,83,0.14);}

  .submit-bar{display:flex; justify-content:center; margin-top:10px;}

  /* ===== نتيجة الاختبار ===== */
  .result-box{background:var(--navy-soft); border:1px solid var(--line); border-radius:22px; padding:40px 30px; text-align:center; margin-bottom:24px;}
  .result-ring{
    width:130px; height:130px; border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center;
    flex-direction:column; border:6px solid var(--navy-deep);
  }
  .result-ring.pass{border-color:var(--green);}
  .result-ring.fail{border-color:var(--rose);}
  .result-ring b{font-family:'Tajawal'; font-size:32px;}
  .result-ring span{font-size:11px; color:var(--bone-dim);}
  .result-box h2{font-size:20px; margin-bottom:8px;}
  .result-box p{font-size:13.5px; color:var(--bone-dim); margin-bottom:22px;}
  .result-actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}

  @media (max-width:640px){
    .exam-top{position:static;}
    .nav{padding:14px 18px;}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=2"></script>
</head>
<body>

<header>
  <div class="nav">
    <div class="brand">
      <svg class="logo-mark" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#5fa82b"/>
        <path d="M12 40 L18 27 L24 33 L30 27 L36 40 Z" fill="#101c46"/>
        <path d="M18 27 L24 33 L21 40 Z" fill="#f3ecd9"/>
        <path d="M30 27 L24 33 L27 40 Z" fill="#f3ecd9"/>
        <rect x="22.5" y="33" width="3" height="9" fill="#5fa82b" stroke="#101c46" stroke-width="0.6"/>
        <circle cx="24" cy="18" r="10" fill="#f3ecd9" stroke="#101c46" stroke-width="1.4"/>
        <ellipse cx="20" cy="17" rx="2.3" ry="2.8" fill="#101c46"/>
        <ellipse cx="28" cy="17" rx="2.3" ry="2.8" fill="#101c46"/>
        <path d="M24 20 l-1.4 2.4 h2.8 z" fill="#101c46"/>
        <path d="M18.5 24.5c2 1.6 8 1.6 11 0" stroke="#101c46" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
      <div class="brand-text">Bio<span style="color:#f3ecd9">Topia</span></div>
    </div>
    <a href="dr-rady-exams-page.html" class="link-accent" style="font-size:13px;">→ رجوع للاختبارات</a>
  </div>
</header>

<main>

  <div id="state-loading" class="state-box">
    <div class="ic">⏳</div>
    <h2>جارٍ تحميل الاختبار...</h2>
  </div>

  <div id="state-denied" class="state-box" style="display:none;">
    <div class="ic">🔒</div>
    <h2 id="denied-title">مقدرش أفتح الاختبار ده</h2>
    <p id="denied-text">تأكد إنك مشترك في الكورس بتاع الاختبار ده.</p>
    <a href="dr-rady-exams-page.html" class="btn">رجوع للاختبارات</a>
  </div>

  <!-- ===== حالة أداء الاختبار ===== -->
  <div id="state-quiz" style="display:none;">
    <div class="exam-top">
      <div>
        <h1 id="exam-title"></h1>
        <p id="exam-sub"></p>
      </div>
      <div id="timer-box" class="timer" style="display:none;">⏱️ <span id="timer-text">--:--</span></div>
    </div>

    <div id="questions-list"></div>

    <div class="submit-bar">
      <button class="btn" id="submit-btn" onclick="submitExam()">تسليم الاختبار ✓</button>
    </div>
  </div>

  <!-- ===== حالة عرض النتيجة ===== -->
  <div id="state-result" style="display:none;">
    <div class="result-box">
      <div id="result-ring" class="result-ring">
        <b id="result-percentage">0%</b>
        <span id="result-fraction">0 / 0</span>
      </div>
      <h2 id="result-title">النتيجة</h2>
      <p id="result-text"></p>
      <div class="result-actions">
        <a href="dr-rady-exams-page.html" class="btn">رجوع للاختبارات</a>
        <button class="btn btn-outline" onclick="location.reload()">إعادة المحاولة</button>
      </div>
    </div>
    <div id="review-list"></div>
  </div>

</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const EXAM_ID = params.get('exam');

  let currentUser = null;
  let exam = null;
  let questions = [];   // [{id, question_text, options:[{id, option_text, is_correct}]}]
  let answers = {};     // {question_id: option_id}
  let timerInterval = null;

  function showState(name){
    ['loading','denied','quiz','result'].forEach(s => {
      document.getElementById('state-' + s).style.display = (s === name ? 'block' : 'none');
    });
  }

  function denied(title, text){
    document.getElementById('denied-title').textContent = title;
    document.getElementById('denied-text').textContent = text;
    showState('denied');
  }

  async function init(){
    if(!EXAM_ID){
      denied('رابط غير صحيح ⚠️', 'الرابط ده ناقصه بيانات، ارجع لصفحة الاختبارات واختار من هناك.');
      return;
    }

    const user = await requireAuth();
    if(!user) return;
    currentUser = user;

    const { data: examData, error: examErr } = await supabaseClient
      .from('exams').select('*').eq('id', EXAM_ID).single();

    if(examErr || !examData){
      denied('الاختبار مش موجود ⚠️', 'الاختبار ده اتشال أو الرابط غلط.');
      return;
    }
    exam = examData;

    // هل الطالب مشترك في الكورس بتاع الاختبار ده؟
    const { data: enrollment } = await supabaseClient
      .from('enrollments').select('status').eq('user_id', user.id).eq('course_id', exam.course_id).maybeSingle();

    if(enrollment?.status !== 'paid'){
      denied('الاختبار ده مقفول 🔒', 'لازم تكون مشترك في الكورس بتاع الاختبار ده عشان تقدر تأديه.');
      return;
    }

    const { data: qData, error: qErr } = await supabaseClient
      .from('exam_questions').select('id, question_text, order_index').eq('exam_id', EXAM_ID).order('order_index', { ascending: true });

    if(qErr || !qData || qData.length === 0){
      denied('الاختبار لسه مش جاهز ⚠️', 'الأسئلة لسه بتتضاف، جرب تاني بعدين.');
      return;
    }

    const questionIds = qData.map(q => q.id);
    const { data: optData } = await supabaseClient
      .from('exam_options').select('id, question_id, option_text, is_correct, order_index').in('question_id', questionIds).order('order_index', { ascending: true });

    questions = qData.map(q => ({
      ...q,
      options: (optData || []).filter(o => o.question_id === q.id)
    }));

    renderQuiz();
    showState('quiz');

    if(exam.time_limit_minutes){
      startTimer(exam.time_limit_minutes * 60);
    }
  }

  function renderQuiz(){
    document.getElementById('exam-title').textContent = exam.title;
    document.getElementById('exam-sub').textContent = exam.description || `${questions.length} سؤال — اختار الإجابة الصح لكل سؤال`;

    document.getElementById('questions-list').innerHTML = questions.map((q, i) => `
      <div class="q-card">
        <div class="q-num">سؤال ${i + 1} من ${questions.length}</div>
        <div class="q-text">${q.question_text}</div>
        <div class="opt-list" id="opts-${q.id}">
          ${q.options.map(o => `
            <label class="opt" id="opt-${o.id}" onclick="selectAnswer('${q.id}', '${o.id}')">
              <input type="radio" name="q-${q.id}" value="${o.id}">
              <span>${o.option_text}</span>
            </label>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  function selectAnswer(questionId, optionId){
    answers[questionId] = optionId;
    document.querySelectorAll(`#opts-${questionId} .opt`).forEach(el => el.classList.remove('selected'));
    document.getElementById(`opt-${optionId}`).classList.add('selected');
    document.getElementById(`opt-${optionId}`).querySelector('input').checked = true;
  }

  function startTimer(totalSeconds){
    let remaining = totalSeconds;
    const box = document.getElementById('timer-box');
    const text = document.getElementById('timer-text');
    box.style.display = 'flex';

    function tick(){
      const m = Math.floor(remaining / 60).toString().padStart(2, '0');
      const s = (remaining % 60).toString().padStart(2, '0');
      text.textContent = `${m}:${s}`;
      if(remaining <= 60) box.classList.add('low');
      if(remaining <= 0){
        clearInterval(timerInterval);
        submitExam();
        return;
      }
      remaining--;
    }
    tick();
    timerInterval = setInterval(tick, 1000);
  }

  async function submitExam(){
    if(timerInterval) clearInterval(timerInterval);
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'جارٍ التصحيح...';

    let correctCount = 0;
    questions.forEach(q => {
      const chosenOptionId = answers[q.id];
      const correctOption = q.options.find(o => o.is_correct);
      if(chosenOptionId && correctOption && chosenOptionId === correctOption.id){
        correctCount++;
      }
    });

    const percentage = Math.round((correctCount / questions.length) * 100);

    const { error } = await supabaseClient.from('exam_attempts').insert({
      exam_id: EXAM_ID,
      user_id: currentUser.id,
      score: correctCount,
      total_questions: questions.length,
      percentage: percentage,
      answers: answers,
      completed_at: new Date().toISOString()
    });

    if(error){
      alert('حصل خطأ في حفظ النتيجة، حاول تاني');
      btn.disabled = false;
      btn.textContent = 'تسليم الاختبار ✓';
      return;
    }

    showResult(correctCount, percentage);
  }

  function showResult(correctCount, percentage){
    const passed = percentage >= (exam.passing_score || 50);

    const ring = document.getElementById('result-ring');
    ring.classList.add(passed ? 'pass' : 'fail');
    document.getElementById('result-percentage').textContent = percentage + '%';
    document.getElementById('result-fraction').textContent = `${correctCount} / ${questions.length}`;
    document.getElementById('result-title').textContent = passed ? 'مبروك، نجحت في الاختبار 🎉' : 'محتاج تراجع الحصة تاني';
    document.getElementById('result-text').textContent = passed
      ? 'أداء كويس! تقدر تكمل باقي الاختبارات أو تراجع أي سؤال غلطت فيه تحت.'
      : `محتاج نسبة ${exam.passing_score || 50}% عشان تعدي، راجع الحصة وجرب تاني.`;

    // مراجعة الإجابات
    document.getElementById('review-list').innerHTML = questions.map((q, i) => {
      const chosenId = answers[q.id];
      const correctOption = q.options.find(o => o.is_correct);
      return `
        <div class="q-card">
          <div class="q-num">سؤال ${i + 1}</div>
          <div class="q-text">${q.question_text}</div>
          <div class="opt-list">
            ${q.options.map(o => {
              let cls = '';
              if(o.is_correct) cls = 'correct';
              else if(o.id === chosenId) cls = 'wrong';
              return `<div class="opt ${cls}">${o.option_text}${o.is_correct ? ' ✓' : (o.id === chosenId ? ' ✗' : '')}</div>`;
            }).join('')}
          </div>
        </div>
      `;
    }).join('');

    showState('result');
  }

  init();
</script>

</body>
</html>
